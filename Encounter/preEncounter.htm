<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遠距醫療 - 診前準備助手</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --accent-color: #e74c3c;
        }
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; background-color: var(--bg-color); color: var(--primary-color); line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--secondary-color); border-bottom: 2px solid var(--secondary-color); padding-bottom: 10px; }
        h2 { font-size: 1.2rem; background: #e8f4fd; padding: 10px; border-left: 5px solid var(--secondary-color); margin-top: 25px; }
        .section { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"], input[type="number"], textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .vitals-box { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px dashed #ccc; }
        .btn-submit { display: block; width: 100%; padding: 15px; background: var(--secondary-color); color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; margin-top: 30px; transition: background 0.3s; }
        .btn-submit:hover { background: #2980b9; }
        .badge { background: var(--accent-color); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <h1>診前健康摘要報告</h1>
    <p style="text-align: center; color: #666;">請填寫以下資訊，完成後可截圖或於診察時提供給醫師</p>

    <div class="section">
        <div class="grid-2">
            <div>
                <label>病患姓名</label>
                <input type="text" placeholder="例如：王小明">
            </div>
            <div>
                <label>本次看診目的</label>
                <select>
                    <option>慢性病回診 (高血壓/糖尿病)</option>
                    <option>急性症狀 (感冒/腹痛/發燒)</option>
                    <option>檢查報告諮詢</option>
                    <option>藥物調整建議</option>
                </select>
            </div>
        </div>
    </div>

    <h2>1. 目前主要症狀與感受 <span class="badge">必填</span></h2>
    <div class="section">
        <label>最不舒服的地方 (主訴)：</label>
        <textarea rows="3" placeholder="請描述哪裡痛、悶、或是不舒服？持續多久了？"></textarea>
    </div>

    <h2>2. 今日生理量測數據 (Vitals)</h2>
    <div class="section vitals-box">
        <div class="grid-2">
            <div>
                <label>血壓 (BP)</label>
                <input type="text" placeholder="例如：135/85 mmHg">
            </div>
            <div>
                <label>心率 (HR)</label>
                <input type="number" placeholder="bpm">
            </div>
            <div>
                <label>體溫 (Temp)</label>
                <input type="text" placeholder="°C">
            </div>
            <div>
                <label>血糖 (若有)</label>
                <input type="number" placeholder="mg/dL">
            </div>
        </div>
    </div>

    <h2>3. 目前用藥與過敏史</h2>
    <div class="section">
        <label>正在服用的藥物 (含保健食品)：</label>
        <textarea rows="2" placeholder="藥名或描述藥袋顏色，如：降血壓藥(白色圓形)"></textarea>
        <label style="margin-top:10px;">過敏紀錄：</label>
        <input type="text" placeholder="如：無，或對某種抗生素過敏">
    </div>

    <h2>4. 我想詢問醫師的問題</h2>
    <div class="section">
        <label>請列出 1-3 個重點：</label>
        <textarea rows="3" placeholder="1. 最近腳好像比較腫？&#10;2. 藥吃完了可以領慢箋嗎？"></textarea>
    </div>

    <button class="btn-submit" onclick="alert('報告已生成！在實際應用中，這裡會將數據轉換為 FHIR 格式傳送給診間系統。')">
        生成診前摘要報告
    </button>
</div>

</body>
</html>

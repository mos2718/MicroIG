<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>FHIR Vital Signs 上傳工具</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; background: #f9f9f9; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { background-color: #ccc; }
        pre { background: #333; color: #fff; padding: 15px; border-radius: 4px; overflow-x: auto; font-size: 13px; }
        .success { color: #28a745; font-weight: bold; }
        .error { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

    <h2>FHIR Vital Signs 上傳工具</h2>
    
    <div class="card">
        <div class="form-group">
            <label>患者 ID (Patient ID)</label>
            <input type="text" id="patientId" value="90252386" readonly>
        </div>

        <div class="form-group">
            <label>選擇生理監測項目 (由 ValueSet CSV 載入)</label>
            <select id="vitalsSelect">
                <option value="">載入中...</option>
            </select>
        </div>

        <div class="form-group">
            <label id="valueLabel">量測數值</label>
            <input type="number" id="vitalsValue" step="0.1" placeholder="請輸入數值">
        </div>

        <button id="uploadBtn" disabled>上傳至 FHIR Server</button>
    </div>

    <h3>伺服器回應結果</h3>
    <div id="status"></div>
    <pre id="responseOutput">尚未執行上傳...</pre>

    <script>
        const FHIR_SERVER = "https://hapi.fhir.org/baseR4";
        const PATIENT_ID = "90252386";
        const VS_CSV_URL = "https://mos2718.github.io/MicroIG/vitalSigns/valueSet.csv";
        
        let vitalsLookup = {};

        // 1. 初始化：載入 CSV ValueSet
        async function loadValueSet() {
            try {
                const response = await fetch(VS_CSV_URL);
                const csvText = await response.text();
                
                // 解析 CSV (假設格式: Item_Name,LOINC_Code,Unit_Display,UCUM_Code,System_LOINC,System_UCUM)
                const rows = csvText.split('\n').slice(1);
                const select = document.getElementById('vitalsSelect');
                select.innerHTML = '<option value="">請選擇項目</option>';

                rows.forEach(row => {
                    const cols = row.split(',');
                    if (cols.length >= 4) {
                        const [name, loinc, unit, ucum] = cols.map(c => c.trim());
                        vitalsLookup[loinc] = { name, unit, ucum };
                        const option = document.createElement('option');
                        option.value = loinc;
                        option.textContent = `${name} (${unit})`;
                        select.appendChild(option);
                    }
                });

                document.getElementById('uploadBtn').disabled = false;
            } catch (error) {
                console.error("無法載入 CSV:", error);
                document.getElementById('status').innerHTML = '<span class="error">無法載入外部 CSV 設定檔檔</span>';
            }
        }

        // 2. 當選擇項目改變時更新標籤
        document.getElementById('vitalsSelect').addEventListener('change', (e) => {
            const selected = vitalsLookup[e.target.value];
            if (selected) {
                document.getElementById('valueLabel').textContent = `量測數值 (${selected.unit})`;
            }
        });

        // 3. 建立並上傳 FHIR Observation
        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const loinc = document.getElementById('vitalsSelect').value;
            const value = document.getElementById('vitalsValue').value;
            const output = document.getElementById('responseOutput');
            const statusDiv = document.getElementById('status');

            if (!loinc || !value) {
                alert("請選擇項目並輸入數值");
                return;
            }

            const item = vitalsLookup[loinc];

            // 根據 FHIR Observation 結構建立 JSON
            const observation = {
                "resourceType": "Observation",
                "status": "final",
                "category": [{
                    "coding": [{
                        "system": "http://terminology.hl7.org/CodeSystem/observation-category",
                        "code": "vital-signs",
                        "display": "Vital Signs"
                    }]
                }],
                "code": {
                    "coding": [{
                        "system": "http://loinc.org",
                        "code": loinc,
                        "display": item.name
                    }]
                },
                "subject": { "reference": `Patient/${PATIENT_ID}` },
                "effectiveDateTime": new Date().toISOString(),
                "valueQuantity": {
                    "value": parseFloat(value),
                    "unit": item.unit,
                    "system": "http://unitsofmeasure.org",
                    "code": item.ucum
                }
            };

            statusDiv.innerHTML = "上傳中...";
            output.textContent = JSON.stringify(observation, null, 2);

            try {
                const response = await fetch(`${FHIR_SERVER}/Observation`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/fhir+json' },
                    body: JSON.stringify(observation)
                });

                const result = await response.json();

                if (response.ok) {
                    statusDiv.innerHTML = '<span class="success">成功上傳！</span>';
                    output.textContent = JSON.stringify(result, null, 2);
                } else {
                    statusDiv.innerHTML = '<span class="error">伺服器報錯</span>';
                    output.textContent = JSON.stringify(result, null, 2);
                }
            } catch (error) {
                statusDiv.innerHTML = '<span class="error">網路錯誤</span>';
                output.textContent = error.message;
            }
        });

        loadValueSet();
    </script>
</body>
</html>
